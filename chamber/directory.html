<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ayiti Chamber Directory</title>
        <meta name="description" content="Business directory for Ayiti Chamber of Commerce">
        <meta name="author" content="Denelson Clerville">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="styles/normalize.css">
        <link rel="stylesheet" href="styles/chamber_large.css">
        <link rel="stylesheet" href="styles/chamber_small.css">
        <script src="scripts/directory.js" defer></script>
    </head>
    <body>

        <header>
            <h1> Business Directory</h1>
            <div class="view-toggle">
                <button id="gridViewBtn" class="icon-btn" aria-label="Grid view" aria-pressed="true">
                    <i class="bi bi-grid-3x3-gap"></i>
                </button>
                <button id="listViewBtn" class="icon-btn" aria-label="List view" aria-pressed="false">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </header>

        <section id="business-container" class="business-grid"></section>
    </body>
</html>
