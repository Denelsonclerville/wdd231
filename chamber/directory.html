<!doctype html>
<html lang="en">
     <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <meta http-equiv="X-UA-Compatible" content="IE=edge">
          <title>Business Directory | Petio-Ville Chamber of Commerce</title>
          <meta name="description" content="Explore the official business directory of the Ayiti Chamber of Commerce. Find top-rated businesses in Pétion-Ville and beyond.">
          <meta name="author" content="Denelson Clerville">
          <meta name="keywords" content="Ayiti, Chamber of Commerce, Business Directory, Pétion-Ville, Haiti Businesses">
          <link rel="icon" href="favicon.ico" type="image/x-icon">
          <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
          <link rel="stylesheet" href="styles/normalize.css">
          <link rel="stylesheet" href="styles/directo.css" media="(max-width: 767px)">
          <link rel="stylesheet" href="styles/directory_large.css" media="(min-width: 768px)">
          <script src="scripts/directory.js" defer></script>
     </head>
     <body>
          <header class="directory-header">
               <h1>Business Directory</h1>
               <div class="view-toggle">
                    <button
                         id="gridViewBtn"
                         class="active"
                         title="Grid View"
                         aria-label="Switch to Grid View">
                         <i class="bi bi-grid-3x3-gap"></i>
                    </button>
                    <button
                         id="listViewBtn"
                         title="List View"
                         aria-label="Switch to List View">
                         <i class="bi bi-list"></i>
                    </button>
               </div>
          </header>
          <main>
               <div id="business-container" class="grid"></div>
          </main>
          <footer>
               <p>&copy; 2026 Pétion-Ville Directory Business</p>
          </footer>
     </body>
</html>
